<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif">
  <rect x="0" y="0" width="1280" height="720" fill="#f7f5f2"/>

  <!-- title -->
  <rect x="0" y="0" width="1280" height="58" fill="#325969"/>
  <text x="32" y="37" fill="#ffffff" font-size="24" font-weight="bold">TDCS CLI ↔ AWS 系統架構</text>
  <text x="1248" y="36" fill="#cfe0e6" font-size="15" text-anchor="end">E6 client-side 下載 ‧ SQS 非同步 broker ‧ Athena 查詢</text>

  <!-- ============ 本機 / TDCS（AWS 帳號外）============ -->
  <rect x="26" y="92" width="246" height="150" rx="10" fill="#ffffff" stroke="#325969" stroke-width="2"/>
  <text x="149" y="118" fill="#325969" font-size="15" font-weight="bold" text-anchor="middle">使用者本機 ‧ CLI wizard</text>
  <text x="149" y="137" fill="#6b8fa7" font-size="11.5" text-anchor="middle">台灣 IP ‧ ink TUI 五步</text>
  <rect x="107" y="152" width="84" height="50" rx="4" fill="#325969"/>
  <rect x="115" y="159" width="68" height="35" rx="2" fill="#9bb89a"/>
  <rect x="95" y="202" width="108" height="8" rx="3" fill="#6b8fa7"/>

  <rect x="26" y="300" width="246" height="92" rx="10" fill="#ffffff" stroke="#6b8fa7" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="149" y="328" fill="#325969" font-size="15" font-weight="bold" text-anchor="middle">TDCS 公開資料源</text>
  <text x="149" y="349" fill="#6b8fa7" font-size="11" text-anchor="middle">tisvcloud.freeway.gov.tw</text>
  <text x="149" y="369" fill="#b06a4f" font-size="11.5" text-anchor="middle">⚠ 僅接受台灣 IP</text>

  <!-- ① 本機 → TDCS 下載 -->
  <line x1="120" y1="242" x2="120" y2="298" stroke="#6b8fa7" stroke-width="2.5"/>
  <polygon points="120,300 115,290 125,290" fill="#6b8fa7"/>
  <line x1="178" y1="298" x2="178" y2="244" stroke="#9bb89a" stroke-width="2.5"/>
  <polygon points="178,242 173,252 183,252" fill="#9bb89a"/>
  <text x="116" y="276" fill="#325969" font-size="11" text-anchor="end">①下載</text>
  <text x="184" y="276" fill="#5e7d57" font-size="11">raw</text>

  <!-- ============ AWS account box ============ -->
  <rect x="312" y="80" width="944" height="612" rx="14" fill="#eaf1f2" stroke="#325969" stroke-width="2.5"/>
  <rect x="330" y="92" width="22" height="22" rx="3" fill="#325969"/>
  <text x="338" y="108" fill="#ffffff" font-size="13" font-weight="bold">aws</text>
  <text x="362" y="108" fill="#325969" font-size="15" font-weight="bold">AWS account · us-east-1（Learner Lab 654485222392）</text>

  <!-- icons row -->
  <!-- API Gateway -->
  <image href="assets/aws_icons/apigw.png" x="362" y="150" width="58" height="58"/>
  <text x="391" y="224" fill="#325969" font-size="12.5" font-weight="bold" text-anchor="middle">API Gateway</text>
  <text x="391" y="240" fill="#6b8fa7" font-size="10.5" text-anchor="middle">POST /clean · GET /jobs</text>

  <!-- SQS -->
  <image href="assets/aws_icons/sqs.png" x="560" y="150" width="58" height="58"/>
  <text x="589" y="224" fill="#325969" font-size="12.5" font-weight="bold" text-anchor="middle">SQS clean-jobs</text>
  <text x="589" y="240" fill="#6b8fa7" font-size="10.5" text-anchor="middle">visibility 920s</text>

  <!-- Lambda -->
  <image href="assets/aws_icons/lambda.png" x="772" y="150" width="58" height="58"/>
  <text x="801" y="224" fill="#325969" font-size="12.5" font-weight="bold" text-anchor="middle">Lambda cleaner</text>
  <text x="801" y="240" fill="#6b8fa7" font-size="10.5" text-anchor="middle">2048MB · 900s · polars</text>

  <!-- S3 -->
  <image href="assets/aws_icons/s3.png" x="1024" y="150" width="58" height="58"/>
  <text x="1053" y="224" fill="#325969" font-size="12.5" font-weight="bold" text-anchor="middle">S3 ‧ 112021024</text>
  <text x="1053" y="240" fill="#6b8fa7" font-size="10.5" text-anchor="middle">raw · cleaned_v2 · jobs</text>

  <!-- DLQ -->
  <image href="assets/aws_icons/sqs.png" x="562" y="300" width="46" height="46"/>
  <text x="585" y="360" fill="#b06a4f" font-size="11" font-weight="bold" text-anchor="middle">DLQ（×2 進死信）</text>

  <!-- Glue -->
  <image href="assets/aws_icons/glue.png" x="772" y="452" width="58" height="58"/>
  <text x="801" y="526" fill="#325969" font-size="12.5" font-weight="bold" text-anchor="middle">Glue Data Catalog</text>
  <text x="801" y="542" fill="#6b8fa7" font-size="10.5" text-anchor="middle">tdcs_dl.cleaned_v2_skeleton</text>

  <!-- Athena -->
  <image href="assets/aws_icons/athena.png" x="1024" y="452" width="58" height="58"/>
  <text x="1053" y="526" fill="#325969" font-size="12.5" font-weight="bold" text-anchor="middle">Athena ‧ tdcs-dl-wg</text>
  <text x="1053" y="542" fill="#6b8fa7" font-size="10.5" text-anchor="middle">10 MB scan cap</text>

  <!-- CloudWatch -->
  <image href="assets/aws_icons/cloudwatch.png" x="1158" y="96" width="44" height="44"/>
  <text x="1180" y="152" fill="#325969" font-size="10.5" text-anchor="middle">CloudWatch</text>

  <!-- IAM dashed -->
  <rect x="346" y="440" width="150" height="118" rx="8" fill="#ffffff" stroke="#c98b8b" stroke-width="1.8" stroke-dasharray="6 4"/>
  <image href="assets/aws_icons/iam.png" x="392" y="452" width="50" height="50"/>
  <text x="421" y="524" fill="#325969" font-size="12" font-weight="bold" text-anchor="middle">IAM</text>
  <text x="421" y="542" fill="#6b8fa7" font-size="10.5" text-anchor="middle">LabRole 授權</text>

  <!-- ================= 流程箭頭 ================= -->
  <!-- ② 本機 → S3 raw（沿頂部）-->
  <polyline points="272,126 1053,126 1053,148" fill="none" stroke="#6b8fa7" stroke-width="2.5"/>
  <polygon points="1053,150 1048,140 1058,140" fill="#6b8fa7"/>
  <text x="640" y="120" fill="#325969" font-size="11.5" font-weight="bold">② 上傳 raw .csv.gz → S3 raw/</text>

  <!-- ③ 本機 → API GW -->
  <line x1="272" y1="186" x2="360" y2="182" stroke="#325969" stroke-width="2.5"/>
  <polygon points="362,182 351,178 353,188" fill="#325969"/>
  <text x="276" y="176" fill="#325969" font-size="11">③ POST /clean（秒回 202）</text>
  <text x="276" y="202" fill="#6b8fa7" font-size="10.5">⑦ GET /jobs 輪詢</text>

  <!-- ④ API GW → SQS -->
  <line x1="420" y1="179" x2="558" y2="179" stroke="#325969" stroke-width="2.5"/>
  <polygon points="560,179 549,175 549,183" fill="#325969"/>
  <text x="489" y="172" fill="#325969" font-size="11" text-anchor="middle">④ enqueue</text>

  <!-- ⑤ SQS → Lambda -->
  <line x1="618" y1="179" x2="770" y2="179" stroke="#9bb89a" stroke-width="2.5"/>
  <polygon points="772,179 761,175 761,183" fill="#9bb89a"/>
  <text x="695" y="172" fill="#5e7d57" font-size="11" text-anchor="middle">⑤ event 清洗</text>

  <!-- Lambda → S3 寫 -->
  <line x1="830" y1="179" x2="1022" y2="179" stroke="#325969" stroke-width="2.5"/>
  <polygon points="1024,179 1013,175 1013,183" fill="#325969"/>
  <text x="927" y="172" fill="#325969" font-size="10.5" text-anchor="middle">讀 raw / 寫 cleaned.parquet</text>

  <!-- SQS → DLQ -->
  <line x1="585" y1="208" x2="585" y2="298" stroke="#c98b8b" stroke-width="2.5" stroke-dasharray="5 4"/>
  <polygon points="585,300 580,290 590,290" fill="#c98b8b"/>

  <!-- ⑥ Lambda → Glue (REPAIR) -->
  <line x1="801" y1="208" x2="801" y2="450" stroke="#325969" stroke-width="2.5"/>
  <polygon points="801,452 796,442 806,442" fill="#325969"/>
  <text x="811" y="340" fill="#325969" font-size="11">⑥ MSCK REPAIR</text>

  <!-- Glue → Athena -->
  <line x1="830" y1="481" x2="1022" y2="481" stroke="#6b8fa7" stroke-width="2.5"/>
  <polygon points="1024,481 1013,477 1013,485" fill="#6b8fa7"/>
  <text x="927" y="474" fill="#6b8fa7" font-size="10.5" text-anchor="middle">註冊 partition</text>

  <!-- S3 cleaned → Athena 查 -->
  <line x1="1053" y1="208" x2="1053" y2="450" stroke="#9bb89a" stroke-width="2.5" stroke-dasharray="5 4"/>
  <polygon points="1053,452 1048,442 1058,442" fill="#9bb89a"/>
  <text x="1063" y="340" fill="#5e7d57" font-size="10.5">cleaned_v2 ← SQL 查</text>

  <!-- CloudWatch → Lambda 監控 -->
  <line x1="1158" y1="130" x2="836" y2="170" stroke="#b59bbf" stroke-width="1.8" stroke-dasharray="4 4"/>
  <text x="1010" y="146" fill="#8a6f95" font-size="10">監控 invocations</text>

  <!-- footer legend -->
  <rect x="0" y="700" width="1280" height="20" fill="#325969"/>
  <text x="32" y="714" fill="#cfe0e6" font-size="11">① 本機下載 TDCS（台灣IP） ② 上傳 S3 raw ③ POST /clean ④ enqueue SQS ⑤ Lambda 清洗 ⑥ Athena MSCK REPAIR ⑦ 輪詢 GET /jobs → done</text>
</svg>
