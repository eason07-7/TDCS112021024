  <text x="90" y="240" text-anchor="start" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">• 國道1 × 國道8 交會節點</text>
  <text x="90" y="280" text-anchor="start" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">• 銜接台南市區、南科通勤、</text>
  <text x="90" y="320" text-anchor="start" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">• 麻豆工業帶與嘉義方向</text>
  <text x="90" y="360" text-anchor="start" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">• 車流結構多元具分析價值</text>
  <rect x="660" y="150" width="560" height="470" fill="#f5ead8" rx="8" opacity="1"/>
  <rect x="660" y="150" width="6" height="470" fill="#c89558" rx="3" opacity="1"/>
