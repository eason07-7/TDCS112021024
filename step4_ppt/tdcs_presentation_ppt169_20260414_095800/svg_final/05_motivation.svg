  <text x="690" y="240" text-anchor="start" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="normal">Q1  4 匝道 3 月車流規律為何？</text>
  <text x="690" y="280" text-anchor="start" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="normal">Q2  車種 × 星期分佈如何？</text>
