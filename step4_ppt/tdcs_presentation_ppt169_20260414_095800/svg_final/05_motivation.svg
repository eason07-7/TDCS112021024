  <text x="40" y="102" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18">為何選下營-麻豆段？複雜交會節點 + 工業物流 + 南科通勤</text>
  <rect x="60" y="150" width="560" height="470" fill="#f5ead8" rx="8" opacity="1"/>
